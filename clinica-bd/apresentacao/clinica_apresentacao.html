<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clínica Médica — Diagrama do Banco de Dados</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --accent: #3fb950;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --accent5: #ffa657;
    --text: #e6edf3;
    --muted: #7d8590;
    --pk: #ffa657;
    --fk: #58a6ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
    color: var(--text);
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
    font-family: 'DM Mono', monospace;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab {
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    transition: all .2s;
    margin-bottom: -1px;
    background: transparent;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--text);
    background: var(--surface);
    border-color: var(--border);
    border-bottom-color: var(--surface);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ─── DIAGRAMA ─── */
  .diagram-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    overflow-x: auto;
  }

  svg.erd { display: block; margin: 0 auto; }

  /* ─── TABELAS GRID ─── */
  .tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .table-card:hover { border-color: #444c56; }

  .table-header {
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .table-header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }

  .col-list { padding: 8px 0; }
  .col-row {
    display: grid;
    grid-template-columns: 26px 1fr 90px 1fr;
    gap: 0 8px;
    padding: 5px 16px;
    font-size: 12px;
    align-items: center;
    transition: background .15s;
  }
  .col-row:hover { background: rgba(255,255,255,.03); }
  .col-key {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .5px;
    padding: 2px 4px;
    border-radius: 4px;
    text-align: center;
  }
  .col-key.pk { background: rgba(255,166,87,.15); color: var(--pk); }
  .col-key.fk { background: rgba(88,166,255,.15); color: var(--fk); }
  .col-name { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); }
  .col-type { font-size: 11px; color: var(--accent4); font-family: 'DM Mono', monospace; }
  .col-desc { font-size: 11px; color: var(--muted); line-height: 1.3; }

  /* ─── ÍNDICES ─── */
  .idx-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .idx-table th {
    background: #21262d;
    padding: 10px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .idx-table td {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .idx-table tr:hover td { background: rgba(255,255,255,.02); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
  }
  .badge-btree { background: rgba(63,185,80,.15); color: var(--accent); }

  /* ─── CONSULTAS ─── */
  .query-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .query-header {
    padding: 14px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .query-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(88,166,255,.15);
    color: var(--accent2);
    font-weight: 700;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }
  .query-title { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .query-why { font-size: 12px; color: var(--muted); }
  .query-body { padding: 16px 20px; display: none; }
  .query-body.open { display: block; }
  pre {
    background: #010409;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
    color: #c9d1d9;
    white-space: pre;
  }
  .kw { color: #ff7b72; }
  .fn { color: #d2a8ff; }
  .str { color: #a5d6ff; }
  .cmt { color: #8b949e; font-style: italic; }
  .num { color: #ffa657; }
</style>
</head>

    title: 'Agenda do dia — por médico',
    why: 'Principal consulta da recepção. Executada várias vezes ao dia. Usa 2 índices.',
    sql: `<span class="cmt">-- Agenda do dia para um médico específico</span>
<span class="kw">SELECT</span>
    c.data_consulta::<span class="fn">TIME</span>           <span class="kw">AS</span> horario,
    p.nome                         <span class="kw">AS</span> paciente,
    p.telefone,
    c.motivo,
    c.status,
    <span class="fn">COALESCE</span>(cv.nome, <span class="str">'Particular'</span>) <span class="kw">AS</span> convenio
<span class="kw">FROM</span> consulta c
<span class="kw">JOIN</span> paciente p  <span class="kw">ON</span> p.id_paciente = c.id_paciente
<span class="kw">LEFT JOIN</span> convenio cv <span class="kw">ON</span> cv.id_convenio = p.id_convenio
<span class="kw">WHERE</span> c.id_medico = <span class="num">1</span>
  <span class="kw">AND</span> c.data_consulta::<span class="fn">DATE</span> = <span class="fn">CURRENT_DATE</span>
<span class="kw">ORDER BY</span> c.data_consulta;`
  },
  {
    num: 2,
    title: 'Histórico completo do paciente (por CPF)',
    why: 'Médico precisa ver todo o histórico antes de atender. JOIN em 3 tabelas.',
    sql: `<span class="cmt">-- Histórico de consultas de um paciente pelo CPF</span>
<span class="kw">SELECT</span>
    c.data_consulta,
    m.nome           <span class="kw">AS</span> medico,
    e.nome           <span class="kw">AS</span> especialidade,
    c.motivo,
    c.diagnostico,
    c.status,
    c.valor_cobrado
<span class="kw">FROM</span> consulta c
<span class="kw">JOIN</span> medico m       <span class="kw">ON</span> m.id_medico         = c.id_medico
<span class="kw">JOIN</span> especialidade e <span class="kw">ON</span> e.id_especialidade  = m.id_especialidade
<span class="kw">WHERE</span> c.id_paciente = (
    <span class="kw">SELECT</span> id_paciente <span class="kw">FROM</span> paciente
    <span class="kw">WHERE</span> cpf = <span class="str">'001.002.003-04'</span>
)
<span class="kw">ORDER BY</span> c.data_consulta <span class="kw">DESC</span>;`
  },
  {
    num: 3,
    title: 'Relatório financeiro mensal por médico',
    why: 'Controle financeiro da clínica. Usa GROUP BY, FILTER e DATE_TRUNC.',
    sql: `<span class="cmt">-- Faturamento do mês corrente por médico</span>
<span class="kw">SELECT</span>
    m.nome                                           <span class="kw">AS</span> medico,
    e.nome                                           <span class="kw">AS</span> especialidade,
    <span class="fn">COUNT</span>(*)                                        <span class="kw">AS</span> total_consultas,
    <span class="fn">COUNT</span>(*) <span class="kw">FILTER</span> (<span class="kw">WHERE</span> c.status = <span class="str">'REALIZADA'</span>) <span class="kw">AS</span> realizadas,
    <span class="fn">SUM</span>(c.valor_cobrado)
        <span class="kw">FILTER</span> (<span class="kw">WHERE</span> c.status = <span class="str">'REALIZADA'</span>)         <span class="kw">AS</span> faturamento,
    <span class="fn">AVG</span>(c.valor_cobrado)
        <span class="kw">FILTER</span> (<span class="kw">WHERE</span> c.status = <span class="str">'REALIZADA'</span>)         <span class="kw">AS</span> ticket_medio
<span class="kw">FROM</span> consulta c
<span class="kw">JOIN</span> medico m       <span class="kw">ON</span> m.id_medico         = c.id_medico
<span class="kw">JOIN</span> especialidade e <span class="kw">ON</span> e.id_especialidade  = m.id_especialidade
<span class="kw">WHERE</span> c.data_consulta >= <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, <span class="fn">CURRENT_DATE</span>)
  <span class="kw">AND</span> c.data_consulta <  <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, <span class="fn">CURRENT_DATE</span>) + <span class="fn">INTERVAL</span> <span class="str">'1 month'</span>
<span class="kw">GROUP BY</span> m.id_medico, m.nome, e.nome
<span class="kw">ORDER BY</span> faturamento <span class="kw">DESC NULLS LAST</span>;`
  },
  {
    num: 4,
    title: 'Pacientes inativos (sem consulta há +6 meses)',
    why: 'Estratégia de reativação de pacientes. Usa HAVING + MAX sobre data.',
    sql: `<span class="cmt">-- Pacientes sem consulta realizada há mais de 6 meses</span>
<span class="kw">SELECT</span>
    p.nome,
    p.cpf,
    p.telefone,
    p.email,
    <span class="fn">MAX</span>(c.data_consulta)::<span class="fn">DATE</span>          <span class="kw">AS</span> ultima_consulta,
    <span class="fn">COALESCE</span>(cv.nome, <span class="str">'Particular'</span>)    <span class="kw">AS</span> convenio
<span class="kw">FROM</span> paciente p
<span class="kw">JOIN</span> consulta c     <span class="kw">ON</span> c.id_paciente   = p.id_paciente
<span class="kw">LEFT JOIN</span> convenio cv <span class="kw">ON</span> cv.id_convenio = p.id_convenio
<span class="kw">WHERE</span> c.status = <span class="str">'REALIZADA'</span>
<span class="kw">GROUP BY</span> p.id_paciente, p.nome, p.cpf, p.telefone, p.email, cv.nome
<span class="kw">HAVING</span> <span class="fn">MAX</span>(c.data_consulta) < <span class="fn">CURRENT_DATE</span> - <span class="fn">INTERVAL</span> <span class="str">'6 months'</span>
<span class="kw">ORDER BY</span> ultima_consulta <span class="kw">ASC</span>;`
  },
  {
    num: 5,
    title: 'Ranking de especialidades por receita',
    why: 'Auxilia a gestão a decidir contratações. Múltiplos JOINs + taxa de realização.',
    sql: `<span class="cmt">-- Desempenho por especialidade com taxa de realização</span>
<span class="kw">SELECT</span>
    e.nome                                                   <span class="kw">AS</span> especialidade,
    <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> m.id_medico)                           <span class="kw">AS</span> qtd_medicos,
    <span class="fn">COUNT</span>(c.id_consulta)                                    <span class="kw">AS</span> total_agendamentos,
    <span class="fn">ROUND</span>(
        <span class="num">100.0</span> * <span class="fn">COUNT</span>(c.id_consulta) <span class="kw">FILTER</span> (<span class="kw">WHERE</span> c.status=<span class="str">'REALIZADA'</span>)
        / <span class="fn">NULLIF</span>(<span class="fn">COUNT</span>(c.id_consulta), <span class="num">0</span>), <span class="num">1</span>
    )                                                        <span class="kw">AS</span> taxa_realizacao_pct,
    <span class="fn">SUM</span>(c.valor_cobrado) <span class="kw">FILTER</span>(<span class="kw">WHERE</span> c.status=<span class="str">'REALIZADA'</span>)  <span class="kw">AS</span> receita_total
<span class="kw">FROM</span> especialidade e
<span class="kw">LEFT JOIN</span> medico m    <span class="kw">ON</span> m.id_especialidade = e.id_especialidade <span class="kw">AND</span> m.ativo = <span class="kw">TRUE</span>
<span class="kw">LEFT JOIN</span> consulta c  <span class="kw">ON</span> c.id_medico = m.id_medico
<span class="kw">GROUP BY</span> e.id_especialidade, e.nome
<span class="kw">ORDER BY</span> receita_total <span class="kw">DESC NULLS LAST</span>;`
  },
];

// Render tables
const grid = document.getElementById('tables-grid');
TABLES.forEach(t => {
  const card = document.createElement('div');
  card.className = 'table-card';
  card.innerHTML = `
    <div class="table-header">
      <span class="dot" style="background:${t.color}"></span>
      <span style="font-family:DM Mono,monospace;font-size:13px;font-weight:600;color:${t.color}">${t.name}</span>
      <span style="margin-left:auto;font-size:11px;color:#7d8590">${t.cols.length} colunas</span>
    </div>
    <div class="col-list">
      ${t.cols.map(c => `
        <div class="col-row">
          <span class="col-key ${c.key.toLowerCase()}">${c.key}</span>
          <span class="col-name">${c.name}</span>
          <span class="col-type">${c.type}</span>
          <span class="col-desc">${c.desc}</span>
        </div>
      `).join('')}
    </div>`;
  grid.appendChild(card);
});

// Render indices
const idxBody = document.getElementById('idx-body');
INDICES.forEach(i => {
  idxBody.innerHTML += `
    <tr>
      <td style="color:#e6edf3">${i.name}</td>
      <td style="color:#ffa657">${i.table}</td>
      <td style="color:#3fb950">${i.field}</td>
      <td><span class="badge badge-btree">${i.type}</span></td>
      <td style="color:#7d8590;font-family:DM Sans,sans-serif;font-size:12px">${i.why}</td>
    </tr>`;
});

// Render queries
const qList = document.getElementById('queries-list');
QUERIES.forEach(q => {
  const div = document.createElement('div');
  div.className = 'query-card';
  div.innerHTML = `
    <div class="query-header" onclick="toggleQuery(this)">
      <div class="query-num">${q.num}</div>
      <div>
        <div class="query-title">${q.title}</div>
        <div class="query-why">${q.why}</div>
      </div>
      <span style="margin-left:auto;color:#7d8590;font-size:18px">▸</span>
    </div>
    <div class="query-body">
      <pre>${q.sql}</pre>
    </div>`;
  qList.appendChild(div);
});

function toggleQuery(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('span:last-child');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▾' : '▸';
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const ids = ['diagrama','tabelas','indices','consultas'];
    t.classList.toggle('active', ids[i] === id);
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === 'tab-' + id);
  });
}
</script>
</body>
</html>
